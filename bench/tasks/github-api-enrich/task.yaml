id: github-api-enrich
prompt: |
  Fetch https://api.github.com/repos/anthropics/claude-code/pulls?state=closed&per_page=5
  and print each PR as a line in the format: "#<number> <title> [merged=<true|false>]".
  One line per PR, no other output.
timeout_seconds: 180
smoke_check:
  kind: regex
  pattern: "^#\\d+.*\\[merged="
  flags: m
